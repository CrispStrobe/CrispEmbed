name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cmake_args: >-
              -DGGML_BLAS=OFF
              -DGGML_LLAMAFILE=ON
            lib_name: libcrispembed.so
          - os: macos-latest
            cmake_args: >-
              -DGGML_METAL=ON
              -DGGML_METAL_EMBED_LIBRARY=ON
              -DGGML_BLAS=ON
              -DGGML_BLAS_VENDOR=Apple
            lib_name: libcrispembed.dylib
          - os: windows-latest
            cmake_args: >-
              -DGGML_BLAS=OFF
            lib_name: crispembed.dll

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCRISPEMBED_BUILD_SHARED=ON
          ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release -j4

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: ./build/crispembed --help 2>&1 || true

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: .\build\Release\crispembed.exe --help 2>&1 || true
        shell: pwsh

      - name: Upload shared library
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.lib_name }}-${{ matrix.os }}
          path: |
            build/${{ matrix.lib_name }}
            build/Release/${{ matrix.lib_name }}
          if-no-files-found: warn
