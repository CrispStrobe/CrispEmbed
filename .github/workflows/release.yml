name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            cmake_args: >-
              -DGGML_BLAS=OFF
              -DGGML_LLAMAFILE=ON
            binaries: crispembed crispembed-server crispembed-quantize
            lib: libcrispembed.so
            archive: crispembed-linux-x86_64.tar.gz

          - name: linux-arm64
            os: ubuntu-24.04-arm
            cmake_args: >-
              -DGGML_BLAS=OFF
            binaries: crispembed crispembed-server crispembed-quantize
            lib: libcrispembed.so
            archive: crispembed-linux-arm64.tar.gz

          - name: macos-arm64
            os: macos-latest
            cmake_args: >-
              -DGGML_METAL=ON
              -DGGML_METAL_EMBED_LIBRARY=ON
              -DGGML_BLAS=ON
              -DGGML_BLAS_VENDOR=Apple
            binaries: crispembed crispembed-server crispembed-quantize
            lib: libcrispembed.dylib
            archive: crispembed-macos-arm64.tar.gz

          - name: windows-x86_64
            os: windows-latest
            cmake_args: >-
              -DGGML_BLAS=OFF
            binaries: crispembed.exe crispembed-server.exe crispembed-quantize.exe
            lib: crispembed.dll
            archive: crispembed-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCRISPEMBED_BUILD_SHARED=ON
          ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release -j4

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p pkg
          for bin in ${{ matrix.binaries }}; do
            cp build/$bin pkg/ 2>/dev/null || true
          done
          cp -P build/${{ matrix.lib }}* pkg/ 2>/dev/null || true
          # libcrispembed references @rpath/libggml-*.dylib (or .so) for
          # backend libs that are built shared alongside it. Bundle them
          # into the same flat tarball so downstream consumers (Rust
          # crispembed-sys, Tauri/Flutter apps) get a self-contained
          # deliverable. `-P` preserves SOVERSION symlinks.
          find build/ggml/src -name 'libggml*' \( -type f -o -type l \) \
            -exec cp -P {} pkg/ \; 2>/dev/null || true
          # Headers — let binding authors extend the FFI without
          # vendoring the whole CrispEmbed repo.
          mkdir -p pkg/include
          cp src/crispembed.h pkg/include/ 2>/dev/null || true
          cp ggml/include/*.h pkg/include/ 2>/dev/null || true
          cp README.md LICENSE pkg/ 2>/dev/null || true
          tar -czf ${{ matrix.archive }} -C pkg .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path pkg
          foreach ($bin in "${{ matrix.binaries }}".Split(" ")) {
            Copy-Item "build/Release/$bin" pkg/ -ErrorAction SilentlyContinue
          }
          Copy-Item "build/Release/${{ matrix.lib }}" pkg/ -ErrorAction SilentlyContinue
          # ggml backend DLLs (Windows multi-config layout).
          Get-ChildItem -Path "build/ggml/src" -Recurse -Filter "ggml*.dll" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName pkg/
          }
          New-Item -ItemType Directory -Force -Path pkg/include
          Copy-Item "src/crispembed.h" pkg/include/ -ErrorAction SilentlyContinue
          Get-ChildItem "ggml/include/*.h" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName pkg/include/
          }
          Copy-Item README.md, LICENSE pkg/ -ErrorAction SilentlyContinue
          Compress-Archive -Path pkg/* -DestinationPath ${{ matrix.archive }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.archive }}

  build-android:
    name: Build android-${{ matrix.abi }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, armeabi-v7a]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} -DANDROID_NATIVE_API_LEVEL=24 \
            -DCMAKE_BUILD_TYPE=Release -DCRISPEMBED_BUILD_SHARED=ON -DGGML_LLAMAFILE=OFF
          cmake --build build -j4
      - name: Package
        run: tar -czf crispembed-android-${{ matrix.abi }}.tar.gz -C build libcrispembed.so
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.abi }}
          path: crispembed-android-${{ matrix.abi }}.tar.gz

  build-ios:
    name: Build ios-arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Build
        run: |
          cmake -S . -B build \
            -DCMAKE_SYSTEM_NAME=iOS -DCMAKE_OSX_DEPLOYMENT_TARGET=15.0 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_SYSROOT=$(xcrun --sdk iphoneos --show-sdk-path) \
            -DCMAKE_C_COMPILER=$(xcrun --sdk iphoneos -f clang) \
            -DCMAKE_CXX_COMPILER=$(xcrun --sdk iphoneos -f clang++) \
            -DCMAKE_BUILD_TYPE=Release \
            -DCRISPEMBED_BUILD_SHARED=OFF -DGGML_METAL=ON -DGGML_METAL_EMBED_LIBRARY=ON
          cmake --build build -j4
      - name: Package
        run: tar -czf crispembed-ios-arm64.tar.gz -C build libcrispembed-static.a
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ios-arm64
          path: crispembed-ios-arm64.tar.gz

  create-release:
    name: Create GitHub Release
    needs: [build, build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CrispEmbed ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/linux-x86_64/*.tar.gz
            dist/linux-arm64/*.tar.gz
            dist/macos-arm64/*.tar.gz
            dist/windows-x86_64/*.zip
            dist/android-arm64-v8a/*.tar.gz
            dist/android-armeabi-v7a/*.tar.gz
            dist/ios-arm64/*.tar.gz
