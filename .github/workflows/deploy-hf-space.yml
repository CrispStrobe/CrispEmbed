name: Deploy HF Space

on:
  push:
    branches: [main]
    paths:
      - 'hf-space/**'
      - '.github/workflows/deploy-hf-space.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push to Hugging Face Space
        uses: JacobLinCool/huggingface-push@v1
        with:
          token: ${{ secrets.HF_TOKEN }}
          repo_id: cstr/CrispEmbed
          repo_type: space
          local_dir: hf-space
